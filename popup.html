<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #242836;
      --border: #2e3348;
      --text: #e2e4ed;
      --text-dim: #8b8fa8;
      --accent: #4f8ff7;
      --accent-hover: #6aa1fa;
      --green: #3dd68c;
      --red: #f05e6b;
      --orange: #f0ac44;
      --radius: 8px;
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    :root.light {
      --bg: #f0f2f8;
      --surface: #ffffff;
      --surface2: #e4e7f0;
      --border: #cdd1e0;
      --text: #1a1d27;
      --text-dim: #5a5e75;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      height: 520px;
      overflow: hidden;
    }

    body {
      width: 420px;
      height: 520px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      line-height: 1.5;
    }

    /* ---- Toast ---- */
    #toast {
      display: none;
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 9px 14px;
      font-size: 12px;
      font-weight: 500;
    }

    /* ---- Header ---- */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .header img { flex-shrink: 0; }
    .header-info { flex: 1; min-width: 0; }
    .header h1 { font-size: 15px; font-weight: 600; }
    .header .sub { font-size: 11px; color: var(--text-dim); }
    .header .session-user {
      font-size: 11px;
      color: var(--accent);
      margin-top: 1px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .header .session-user.no-session { color: var(--text-dim); }

    /* ---- Buttons ---- */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }
    .btn-primary, .btn-danger { background: #ffffff; color: #111111; }
    .btn-primary:hover, .btn-danger:hover { opacity: 0.85; }
    .btn-sm { padding: 4px 10px; font-size: 11px; }
    :root.light .btn-primary, :root.light .btn-danger { background: #111111; color: #ffffff; }

    /* ---- Toggle ---- */
    .btn-toggle {
      padding: 5px 10px;
      font-size: 11px;
      font-weight: 700;
      border-radius: 20px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }
    .btn-toggle.active {
      background: rgba(61,214,140,0.12);
      border-color: var(--green);
      color: var(--green);
    }
    .btn-toggle.inactive {
      background: rgba(139,143,168,0.1);
      border-color: var(--text-dim);
      color: var(--text-dim);
    }

    /* ---- Tabs ---- */
    .tab-bar {
      display: flex;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .tab-btn {
      flex: 1;
      padding: 9px 0;
      font-size: 12px;
      font-weight: 600;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-dim);
      cursor: pointer;
      transition: all .15s;
      letter-spacing: 0.3px;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .tab-panel { display: none; flex: 1; min-height: 0; flex-direction: column; overflow: hidden; }
    .tab-panel.active { display: flex; }

    /* ---- Controls ---- */
    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .controls label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      white-space: nowrap;
    }
    input[type="time"] {
      padding: 6px 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 13px;
      font-family: var(--font);
      outline: none;
      transition: border-color .15s;
    }
    input[type="time"]:focus { border-color: var(--accent); }

    /* ---- Logs ---- */
    .logs-section {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: 12px 16px;
      overflow: hidden;
    }
    .logs-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      flex-shrink: 0;
    }
    .logs-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
    }
    .log-list {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      font-family: 'Consolas', 'SF Mono', monospace;
      font-size: 11px;
    }
    .log-entry {
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }
    .log-ts { color: var(--text-dim); }
    .log-level { font-weight: 700; }
    .log-level.OK     { color: var(--green); }
    .log-level.INFO   { color: var(--accent); }
    .log-level.FINEST { color: #a78bfa; }
    .log-level.WARN   { color: var(--orange); }
    .log-level.ERROR  { color: var(--red); }
    .log-level.SKIP   { color: var(--text-dim); }
    .log-msg { word-break: break-word; margin-top: 1px; }

    /* ---- Engagements tab ---- */
    .eng-list {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .eng-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
    }
    .eng-line1 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 6px;
    }
    .eng-line1 .eng-title {
      font-weight: 400;
      color: var(--text-dim);
    }
    .eng-line2 {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }
    .eng-line3 {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .eng-badge {
      font-size: 10px;
      font-weight: 500;
      padding: 1px 6px;
      border-radius: 4px;
      white-space: nowrap;
      letter-spacing: 0.3px;
      cursor: default;
      user-select: none;
    }
    .eng-badge.status { color: #f0ac44; background: rgba(240,172,68,0.15); }
    .eng-badge.stage  { color: #4f8ff7; background: rgba(79,143,247,0.15); }
    :root.light .eng-badge.status { color: #92400e; background: #fde68a; }
    :root.light .eng-badge.stage  { color: #1e3a8a; background: #bfdbfe; }

    .btn-call {
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      transition: opacity .15s;
      white-space: nowrap;
    }
    .btn-call { cursor: pointer; transition: opacity .15s; }
    .btn-call:hover { opacity: 0.85; }
    .btn-call:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-call.internal { background: var(--green); color: #0a2e1f; }
    .btn-call.customer { background: var(--green); color: #0a2e1f; }

    .eng-duration {
      font-size: 11px;
      padding: 3px 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      cursor: pointer;
      outline: none;
    }
    .eng-duration:focus { border-color: var(--accent); }
    .eng-duration:disabled { opacity: 0.35; cursor: not-allowed; }

    .eng-scheduled-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--green);
    }
    .btn-call-completed {
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: var(--radius);
      border: none;
      background: var(--red);
      color: #fff;
      cursor: pointer;
      transition: opacity .15s;
      white-space: nowrap;
    }
    .btn-call-completed:hover { opacity: 0.85; }
    .btn-call-completed:disabled { opacity: 0.35; cursor: not-allowed; }
    .eng-card.scheduled {
      opacity: 0.6;
      border-color: transparent;
      background: var(--surface2);
    }

    /* ---- Accordion ---- */
    .accordion {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .acc-section { flex-shrink: 0; border-bottom: 1px solid var(--border); }
    .acc-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 16px;
      cursor: pointer;
      background: var(--surface);
      user-select: none;
    }
    .acc-header:hover { background: var(--surface2); }
    .acc-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .acc-chevron { font-size: 10px; transition: transform .2s; display: inline-block; }
    .acc-section.open .acc-chevron { transform: rotate(90deg); }
    .acc-count {
      font-size: 10px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 8px;
      background: var(--surface2);
      color: var(--text-dim);
    }
    .acc-body {
      display: none;
      height: 140px;
      overflow-y: auto;
      font-family: 'Consolas', 'SF Mono', monospace;
      font-size: 11px;
      padding: 6px 16px;
      background: var(--bg);
    }
    .acc-section.open .acc-body { display: block; }

    .empty-msg { color: var(--text-dim); text-align: center; padding: 30px 0; }
    .eng-loading { color: var(--text-dim); text-align: center; padding: 30px 0; font-size: 12px; }
  </style>
</head>
<body>

  <div id="toast"></div>

  <!-- Header -->
  <div class="header">
    <img src="icons/icon48.png" width="28" height="28" style="border-radius:6px;" />
    <div class="header-info">
      <h1>Architect Cadence</h1>
      <div class="sub">Auto-update Architect Engagements daily</div>
      <div class="session-user no-session" id="sessionUser">Not signed in</div>
    </div>
    <button id="btnTheme" title="Toggle light/dark" style="background:none;border:none;cursor:pointer;font-size:16px;padding:4px;line-height:1;color:var(--text-dim);">🌙</button>
    <button class="btn btn-toggle active" id="btnToggle">● Active</button>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="engagements">Engagements</button>
    <button class="tab-btn" data-tab="schedule">Schedule</button>
  </div>

  <!-- Tab: Schedule -->
  <div class="tab-panel" id="tab-schedule">
    <div class="controls">
      <label for="scheduledTime">Daily Run</label>
      <input type="time" id="scheduledTime" value="17:00" />
      <button class="btn btn-primary" id="btnRunNow">Run Now</button>
      <button class="btn btn-primary" id="btnOpenConfig">Show Config</button>
    </div>
    <div class="accordion" id="logAccordion">
      <div class="acc-section open" id="accEngagements">
        <div class="acc-header">
          <span class="acc-title">
            <span class="acc-chevron">▶</span> Engagement View
            <span class="acc-count" id="engLogCount">0</span>
          </span>
          <button class="btn btn-danger btn-sm" id="btnClearEngLogs">Clear</button>
        </div>
        <div class="acc-body" id="engLogList"><div class="empty-msg">No logs yet.</div></div>
      </div>
      <div class="acc-section" id="accScheduler">
        <div class="acc-header">
          <span class="acc-title">
            <span class="acc-chevron">▶</span> Daily Scheduler
            <span class="acc-count" id="schedLogCount">0</span>
          </span>
          <button class="btn btn-danger btn-sm" id="btnClearSchedLogs">Clear</button>
        </div>
        <div class="acc-body" id="schedLogList"><div class="empty-msg">No logs yet.</div></div>
      </div>
    </div>
  </div>

  <!-- Tab: Engagements -->
  <div class="tab-panel active" id="tab-engagements">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 14px 0;flex-shrink:0;">
      <span class="logs-title">My Engagements</span>
      <button class="btn btn-sm" id="btnRefreshEngagements" style="background:var(--surface2);color:var(--text-dim);border:1px solid var(--border);">↺ Refresh</button>
    </div>
    <div class="eng-list" id="engList">
      <div class="eng-loading">Loading engagements…</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
