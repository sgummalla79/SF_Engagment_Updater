<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #242836;
      --border: #2e3348;
      --text: #e2e4ed;
      --text-dim: #8b8fa8;
      --accent: #4f8ff7;
      --accent-hover: #6aa1fa;
      --green: #3dd68c;
      --red: #f05e6b;
      --orange: #f0ac44;
      --radius: 8px;
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      height: 500px;
      overflow: hidden;
    }

    body {
      width: 360px;
      height: 500px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      line-height: 1.5;
    }

    /* ---- Toast ---- */
    #toast {
      display: none;
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 9px 14px;
      font-size: 12px;
      font-weight: 500;
    }

    /* ---- Header ---- */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .header svg { flex-shrink: 0; }
    .header h1 { font-size: 15px; font-weight: 600; }
    .header .sub { font-size: 11px; color: var(--text-dim); }

    /* ---- Section 1: Controls ---- */
    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .controls label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      white-space: nowrap;
    }
    input[type="time"] {
      padding: 6px 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 13px;
      font-family: var(--font);
      outline: none;
      transition: border-color .15s;
    }
    input[type="time"]:focus { border-color: var(--accent); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-danger:hover { opacity: 0.9; }
    .btn-sm { padding: 4px 10px; font-size: 11px; }

    /* ---- Toggle ---- */
    .btn-toggle {
      padding: 5px 10px;
      font-size: 11px;
      font-weight: 700;
      border-radius: 20px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .btn-toggle.active {
      background: rgba(61,214,140,0.12);
      border-color: var(--green);
      color: var(--green);
    }
    .btn-toggle.inactive {
      background: rgba(139,143,168,0.1);
      border-color: var(--text-dim);
      color: var(--text-dim);
    }

    /* ---- Section 2: Logs ---- */
    .logs-section {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: 12px 16px;
      overflow: hidden;
    }
    .logs-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .logs-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
    }
    .log-list {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      font-family: 'Consolas', 'SF Mono', monospace;
      font-size: 11px;
    }
    .log-entry {
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }
    .log-ts { color: var(--text-dim); }
    .log-level { font-weight: 700; }
    .log-level.OK     { color: var(--green); }
    .log-level.INFO   { color: var(--accent); }
    .log-level.FINEST { color: #a78bfa; }
    .log-level.WARN   { color: var(--orange); }
    .log-level.ERROR  { color: var(--red); }
    .log-level.SKIP   { color: var(--text-dim); }
    .log-msg { word-break: break-word; margin-top: 1px; }
    .empty-msg { color: var(--text-dim); text-align: center; padding: 30px 0; }
  </style>
</head>
<body>

  <div id="toast"></div>

  <!-- Header -->
  <div class="header">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <rect width="28" height="28" rx="6" fill="#4f8ff7"/>
      <path d="M8 14l4 4 8-8" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div>
      <h1>Architect Cadence</h1>
      <div class="sub">Auto-update Architect Engagements daily</div>
    </div>
    <button class="btn btn-toggle active" id="btnToggle" style="margin-left:auto">● Active</button>
  </div>

  <!-- Section 1: Controls -->
  <div class="controls">
    <label for="scheduledTime">Daily Run</label>
    <input type="time" id="scheduledTime" value="17:00" />
    <button class="btn btn-primary" id="btnRunNow">Run Now</button>
  </div>

  <!-- Section 2: Logs -->
  <div class="logs-section">
    <div class="logs-header">
      <span class="logs-title">Execution History</span>
      <button class="btn btn-danger btn-sm" id="btnClearLogs">Clear</button>
    </div>
    <div class="log-list" id="logList">
      <div class="empty-msg">No logs yet.</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
