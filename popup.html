<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #242836;
      --border: #2e3348;
      --text: #e2e4ed;
      --text-dim: #8b8fa8;
      --accent: #4f8ff7;
      --accent-hover: #6aa1fa;
      --green: #3dd68c;
      --red: #f05e6b;
      --orange: #f0a c44;
      --radius: 8px;
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 460px;
      min-height: 400px;
      max-height: 600px;
      overflow-y: auto;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      line-height: 1.5;
    }

    /* ---- Header ---- */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 18px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .header svg { flex-shrink: 0; }
    .header h1 { font-size: 15px; font-weight: 600; }
    .header .sub { font-size: 11px; color: var(--text-dim); }

    /* ---- Tabs ---- */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .tab-btn {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-dim);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: all .15s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    .tab-panel { display: none; padding: 16px 18px; }
    .tab-panel.active { display: block; }

    /* ---- Form Elements ---- */
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      margin-bottom: 5px;
    }
    input[type="text"],
    input[type="time"],
    input[type="number"],
    select,
    textarea {
      width: 100%;
      padding: 8px 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 13px;
      font-family: var(--font);
      outline: none;
      transition: border-color .15s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 50px; }

    .field { margin-bottom: 14px; }

    .row { display: flex; gap: 10px; }
    .row > * { flex: 1; }

    /* ---- Toggle ---- */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
    }
    .toggle-label { font-size: 13px; font-weight: 500; }
    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle .slider {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 22px;
      cursor: pointer;
      transition: background .2s;
    }
    .toggle .slider::after {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: var(--text);
      border-radius: 50%;
      transition: transform .2s;
    }
    .toggle input:checked + .slider { background: var(--accent); }
    .toggle input:checked + .slider::after { transform: translateX(18px); }

    /* ---- Buttons ---- */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 16px;
      font-size: 12px;
      font-weight: 600;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all .15s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--border); }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-danger:hover { opacity: 0.9; }
    .btn-sm { padding: 5px 10px; font-size: 11px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-row { display: flex; gap: 8px; margin-top: 10px; }

    /* ---- Update Fields Table ---- */
    .field-table { width: 100%; border-collapse: collapse; margin-top: 6px; }
    .field-table th {
      text-align: left;
      padding: 6px 8px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
    }
    .field-table td {
      padding: 5px 8px;
      border-bottom: 1px solid var(--border);
    }
    .field-table input, .field-table select {
      padding: 5px 7px;
      font-size: 12px;
    }
    .remove-row {
      background: none;
      border: none;
      color: var(--red);
      cursor: pointer;
      font-size: 16px;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .remove-row:hover { background: rgba(240,94,107,0.15); }

    /* ---- Status ---- */
    .status-bar {
      padding: 8px 12px;
      border-radius: var(--radius);
      font-size: 12px;
      margin-top: 12px;
      display: none;
    }
    .status-bar.show { display: block; }
    .status-bar.ok { background: rgba(61,214,140,0.12); color: var(--green); }
    .status-bar.error { background: rgba(240,94,107,0.12); color: var(--red); }
    .status-bar.info { background: rgba(79,143,247,0.12); color: var(--accent); }

    /* ---- Logs ---- */
    .log-list {
      max-height: 320px;
      overflow-y: auto;
      font-family: 'Consolas', 'SF Mono', monospace;
      font-size: 11px;
    }
    .log-entry {
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }
    .log-ts { color: var(--text-dim); white-space: nowrap; flex-shrink: 0; }
    .log-level {
      font-weight: 700;
      width: 44px;
      flex-shrink: 0;
    }
    .log-level.OK { color: var(--green); }
    .log-level.INFO { color: var(--accent); }
    .log-level.WARN { color: var(--orange); }
    .log-level.ERROR { color: var(--red); }
    .log-level.SKIP { color: var(--text-dim); }
    .log-msg { word-break: break-word; }
    .empty-msg { color: var(--text-dim); text-align: center; padding: 30px 0; }
  </style>
</head>
<body>

  <!-- Toast -->
  <div id="toast" style="
    display:none;
    position:sticky;
    top:0;
    z-index:100;
    padding:9px 14px;
    font-size:12px;
    font-weight:500;
  "></div>

  <!-- Header -->
  <div class="header">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <rect width="28" height="28" rx="6" fill="#4f8ff7"/>
      <path d="M8 14l4 4 8-8" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div>
      <h1>ArchCadence</h1>
      <div class="sub">Auto-update Architect Engagements daily</div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="config">Configuration</button>
    <button class="tab-btn" data-tab="logs">Logs</button>
  </div>

  <!-- Tab: Configuration -->
  <div class="tab-panel active" id="tab-config">

    <div class="field">
      <label for="scheduledTime">Daily Run Time</label>
      <input type="time" id="scheduledTime" value="17:00" />
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="btnRunNow">Run Now</button>
    </div>
  </div>

  <!-- Tab: Logs -->
  <div class="tab-panel" id="tab-logs">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <span style="color:var(--text-dim);font-size:12px;">Execution history (latest first)</span>
      <button class="btn btn-danger btn-sm" id="btnClearLogs">Clear Logs</button>
    </div>
    <div class="log-list" id="logList">
      <div class="empty-msg">No logs yet.</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
